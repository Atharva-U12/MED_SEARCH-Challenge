name: Auto-Grader
on: [push, pull_request]

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install pandas tabulate

      - name: Run Judge
        run: |
          python3 src/evaluator.py 

      - name: Update Leaderboard
        run: |
          # 1. Identity setup
          git config --global user.email "action@github.com"
          git config --global user.name "Leaderboard-Bot"
          
          # 2. Hide the new leaderboard changes temporarily (Stash)
          # This cleans the workspace so Git doesn't complain during the pull
          git add leaderboard.md
          git stash
          
          # 3. Sync with the remote repository
          git pull origin main --rebase
          
          # 4. Bring the new leaderboard changes back (Pop)
          git stash pop || echo "No changes to apply"
          
          # 5. Finalize the commit
          # [skip ci] prevents an infinite loop of actions
          git add leaderboard.md
          git commit -m "update: leaderboard [skip ci]" || echo "No changes to commit"
          
          # 6. Push to GitHub
          git push origin main
