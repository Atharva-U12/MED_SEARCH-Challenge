name: Auto-Grader
on: [push, pull_request]

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install pandas tabulate

      - name: Run Judge
        run: |
          python3 src/evaluator.py 

      - name: Update Leaderboard
        run: |
          # 1. Identity setup
          git config --global user.email "action@github.com"
          git config --global user.name "Leaderboard-Bot"
          
          # 2. Stage the new leaderboard FIRST to avoid the "unstaged changes" error
          git add leaderboard.md
          
          # 3. Stash any other minor environment changes and pull latest from GitHub
          git pull origin main --rebase
          
          # 4. Finalize the commit
          # Using [skip ci] prevents the action from triggering itself again
          git commit -m "update: leaderboard [skip ci]" || echo "No changes to commit"
          
          # 5. Push back to the repository
          git push origin main
